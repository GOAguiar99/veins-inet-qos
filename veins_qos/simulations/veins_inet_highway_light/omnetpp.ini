[General]
network = Scenario
sim-time-limit = 100s
debug-on-errors = true
cmdenv-express-mode = true
image-path = ../../../../images

# ============ APPS ============
*.node[*].numApps = 2
*.node[*].app[0].typename = "veins_qos.traffic.CritPacketSender"
*.node[*].app[0].localPort = 9001
*.node[*].app[0].destPort = 9001
*.node[*].app[0].sendInterval = exponential(500ms)
*.node[*].app[0].payloadBytes = 200
*.node[*].app[0].packetName = "be_periodic"
*.node[*].app[0].voDedupWindow = 200ms

*.node[*].app[1].typename = "veins_qos.traffic.CrashBurstApp"
*.node[*].app[1].localPort = 9002
*.node[*].app[1].destPort = 9001
*.node[*].app[1].crashAt = 30s
*.node[*].app[1].resumeAfter = 30s
*.node[*].app[1].sendInterval = 100ms
*.node[*].app[1].payloadBytes = 120
*.node[*].app[1].repeatCount = 3
*.node[*].app[1].repeatGap = 20ms
*.node[*].app[1].repeatJitter = 5ms
*.node[*].app[1].packetName = "accident_vo"

# ============ Ieee80211Interface ============
*.node[*].wlan[0].opMode = "p"
*.node[*].wlan[*].mac.typename = "veins_qos.mac.V2xIeee80211Mac"
*.node[*].wlan[0].radio.typename = "Ieee80211DimensionalRadio"
*.node[*].wlan[0].radio.bandName = "5.9 GHz"
*.node[*].wlan[0].radio.channelNumber = 3
*.node[*].wlan[0].radio.transmitter.power = 20mW
*.node[*].wlan[0].radio.bandwidth = 10 MHz
*.node[*].wlan[*].radio.antenna.mobility.typename = "AttachedMobility"
*.node[*].wlan[*].radio.antenna.mobility.mobilityModule = "^.^.^.^.mobility"
*.node[*].wlan[*].radio.antenna.mobility.offsetX = -2.5m
*.node[*].wlan[*].radio.antenna.mobility.offsetZ = 1.5m
*.node[*].wlan[*].radio.antenna.mobility.constraintAreaMinX = 0m
*.node[*].wlan[*].radio.antenna.mobility.constraintAreaMaxX = 0m
*.node[*].wlan[*].radio.antenna.mobility.constraintAreaMinY = 0m
*.node[*].wlan[*].radio.antenna.mobility.constraintAreaMaxY = 0m
*.node[*].wlan[*].radio.antenna.mobility.constraintAreaMinZ = 0m
*.node[*].wlan[*].radio.antenna.mobility.constraintAreaMaxZ = 0m

# ============ HostAutoConfigurator ============
*.node[*].ipv4.configurator.typename = "HostAutoConfigurator"
*.node[*].ipv4.configurator.interfaces = "wlan0"
*.node[*].ipv4.configurator.mcastGroups = "224.0.0.1"

# ============ VeinsInetMobility ============
*.node[*].mobility.typename = "VeinsInetMobility"

# ============ VeinsInetManager ============
*.manager.updateInterval = 1s
*.manager.host = "localhost"
*.manager.port = 9999
*.manager.autoShutdown = true
*.manager.launchConfig = xmldoc("highway.launchd.xml")
*.manager.moduleType = "veins_qos.veins_inet.VeinsInetCar"

# ============ PhysicalEnvironment ============
*.physicalEnvironment.config = xmldoc("highway.obstacles.xml")
*.radioMedium.obstacleLoss.typename = "IdealObstacleLoss"

# ============ Recording ============
**.vector-recording = true
**.scalar-recording = true

# ============ Network Load Profiles ============
# Vehicle density is selected by the scenario package (`highway_light` vs `highway_heavy`).
# These helper configs vary only the application-side channel load.
[Config _netload_low]
*.node[*].app[0].sendInterval = exponential(1s)
*.node[*].app[0].payloadBytes = 120
*.node[*].app[1].sendInterval = 150ms
*.node[*].app[1].payloadBytes = 120
*.node[*].app[1].repeatCount = 2
*.node[*].app[1].repeatGap = 25ms
*.node[*].app[1].repeatJitter = 5ms

[Config _netload_medium]
*.node[*].app[0].sendInterval = exponential(500ms)
*.node[*].app[0].payloadBytes = 200
*.node[*].app[1].sendInterval = 100ms
*.node[*].app[1].payloadBytes = 120
*.node[*].app[1].repeatCount = 3
*.node[*].app[1].repeatGap = 20ms
*.node[*].app[1].repeatJitter = 5ms

[Config _netload_high]
*.node[*].app[0].sendInterval = exponential(250ms)
*.node[*].app[0].payloadBytes = 320
*.node[*].app[1].sendInterval = 75ms
*.node[*].app[1].payloadBytes = 150
*.node[*].app[1].repeatCount = 4
*.node[*].app[1].repeatGap = 15ms
*.node[*].app[1].repeatJitter = 3ms

[Config plain]
*.visualizer.osgVisualizer.typename = ""
*.node[*].wlan[*].mac.dcf.channelAccess.pendingQueue.packetCapacity = 128

[Config edca_only]
extends = plain
*.node[*].wlan[*].mac.qosStation = true
*.node[*].wlan[*].mac.hcf.typename = "Hcf"
*.node[*].wlan[*].mac.hcf.edca.edcaf[0].pendingQueue.packetCapacity = 128
*.node[*].wlan[*].mac.hcf.edca.edcaf[1].pendingQueue.packetCapacity = 128
*.node[*].wlan[*].mac.hcf.edca.edcaf[2].pendingQueue.packetCapacity = 64
*.node[*].wlan[*].mac.hcf.edca.edcaf[3].pendingQueue.packetCapacity = 32
*.node[*].wlan[*].mac.hcf.originatorMacDataService.msduAggregationPolicy.typename = ""
*.node[*].wlan[*].classifier.typename = "veins_qos.qos.QosClassifier"
*.node[*].wlan[*].classifier.crashDscp = 46
*.node[*].wlan[*].classifier.defaultUp = 0
*.node[*].wlan[*].mac.hcf.edca.edcaf[0].aifsn = 7
*.node[*].wlan[*].mac.hcf.edca.edcaf[1].aifsn = 3
*.node[*].wlan[*].mac.hcf.edca.edcaf[2].aifsn = 2
*.node[*].wlan[*].mac.hcf.edca.edcaf[3].aifsn = 2
*.node[*].wlan[*].mac.hcf.edca.edcaf[0].cwMin = 15
*.node[*].wlan[*].mac.hcf.edca.edcaf[0].cwMax = 1023
*.node[*].wlan[*].mac.hcf.edca.edcaf[1].cwMin = 15
*.node[*].wlan[*].mac.hcf.edca.edcaf[1].cwMax = 1023
*.node[*].wlan[*].mac.hcf.edca.edcaf[2].cwMin = 7
*.node[*].wlan[*].mac.hcf.edca.edcaf[2].cwMax = 15
*.node[*].wlan[*].mac.hcf.edca.edcaf[3].cwMin = 3
*.node[*].wlan[*].mac.hcf.edca.edcaf[3].cwMax = 7

[Config edca_v2x_vo_stable]
extends = edca_only

*.node[*].wlan[*].mac.hcf.typename = "veins_qos.mac.V2xHcf"
*.node[*].wlan[*].mac.hcf.adaptiveBlocking = true
*.node[*].wlan[*].mac.hcf.blockDuration = 15ms
*.node[*].wlan[*].mac.hcf.maxContinuousBlock = 80ms
*.node[*].wlan[*].mac.hcf.FSMController.maxContinuousBlock = 80ms
*.node[*].wlan[*].mac.hcf.FSMController.sendingGuardTimeout = 5ms
*.node[*].wlan[*].mac.hcf.voQueueThreshold = 2

# AC_BE (edcaf[1])
*.node[*].wlan[*].mac.hcf.edca.edcaf[1].aifsn = 5
*.node[*].wlan[*].mac.hcf.edca.edcaf[1].cwMin = 31
*.node[*].wlan[*].mac.hcf.edca.edcaf[1].cwMax = 1023
*.node[*].wlan[*].mac.hcf.edca.edcaf[1].pendingQueue.packetCapacity = 64

# AC_VO (edcaf[3])
*.node[*].wlan[*].mac.hcf.edca.edcaf[3].aifsn = 2
*.node[*].wlan[*].mac.hcf.edca.edcaf[3].cwMin = 3
*.node[*].wlan[*].mac.hcf.edca.edcaf[3].cwMax = 7
*.node[*].wlan[*].mac.hcf.edca.edcaf[3].txopProcedure.txopLimit = 1.5ms


[Config edca_v2x_vo_guarded]
extends = edca_only

# V2X controller with bounded blocking (not hard starvation)
*.node[*].wlan[*].mac.hcf.typename = "veins_qos.mac.V2xHcf"
*.node[*].wlan[*].mac.hcf.adaptiveBlocking = true
*.node[*].wlan[*].mac.hcf.voQueueThreshold = 3
*.node[*].wlan[*].mac.hcf.blockDuration = 4ms
*.node[*].wlan[*].mac.hcf.maxContinuousBlock = 20ms
*.node[*].wlan[*].mac.hcf.FSMController.maxContinuousBlock = 20ms
*.node[*].wlan[*].mac.hcf.FSMController.sendingGuardTimeout = 4ms

# BE: deprioritize, but keep service alive
*.node[*].wlan[*].mac.hcf.edca.edcaf[1].aifsn = 6
*.node[*].wlan[*].mac.hcf.edca.edcaf[1].cwMin = 63
*.node[*].wlan[*].mac.hcf.edca.edcaf[1].cwMax = 1023
*.node[*].wlan[*].mac.hcf.edca.edcaf[1].pendingQueue.packetCapacity = 32

# VO: maintain priority with moderate TXOP (avoid over-hogging)
*.node[*].wlan[*].mac.hcf.edca.edcaf[3].aifsn = 2
*.node[*].wlan[*].mac.hcf.edca.edcaf[3].cwMin = 3
*.node[*].wlan[*].mac.hcf.edca.edcaf[3].cwMax = 7
*.node[*].wlan[*].mac.hcf.edca.edcaf[3].txopProcedure.txopLimit = 0.8ms
*.node[*].wlan[*].mac.hcf.edca.edcaf[3].pendingQueue.packetCapacity = 64

# ============ Explicit Density x Load Matrix ============
# The legacy no-suffix configs above keep the historical medium load.
[Config plain_netload_low]
extends = plain, _netload_low

[Config plain_netload_medium]
extends = plain, _netload_medium

[Config plain_netload_high]
extends = plain, _netload_high

[Config edca_only_netload_low]
extends = edca_only, _netload_low

[Config edca_only_netload_medium]
extends = edca_only, _netload_medium

[Config edca_only_netload_high]
extends = edca_only, _netload_high

[Config edca_v2x_vo_stable_netload_low]
extends = edca_v2x_vo_stable, _netload_low

[Config edca_v2x_vo_stable_netload_medium]
extends = edca_v2x_vo_stable, _netload_medium

[Config edca_v2x_vo_stable_netload_high]
extends = edca_v2x_vo_stable, _netload_high

[Config edca_v2x_vo_guarded_netload_low]
extends = edca_v2x_vo_guarded, _netload_low

[Config edca_v2x_vo_guarded_netload_medium]
extends = edca_v2x_vo_guarded, _netload_medium

[Config edca_v2x_vo_guarded_netload_high]
extends = edca_v2x_vo_guarded, _netload_high
